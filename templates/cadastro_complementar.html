{% extends "base.html" %}

{% block title %}Finalizar Cadastro{% endblock %}

{% block content %}
<div class="card-lead">
    <!-- O Stepper de círculos já é renderizado pelo base.html usando a variável fase_atual -->
    
    <header style="margin-bottom: 20px;">
        <h2 style="font-family: 'Rajdhani', sans-serif; color: var(--neon-orange); text-align: center; text-transform: uppercase; margin: 0;">
            Level 5: Player Profile
        </h2>
        <p style="text-align: center; color: var(--text-dim); font-size: 0.9rem; margin-top: 5px;">
            Quase lá, <strong>{{ cliente.nome_completo }}</strong>! Complete seu endereço e documentos.
        </p>
    </header>

    <form action="{{ url_for('finalizar') }}" method="POST">
        <!-- DOCUMENTAÇÃO -->
        <div class="row">
            <div class="input-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" value="{{ cliente.cpf or '' }}" placeholder="000.000.000-00" required>
            </div>
            <div class="input-group">
                <label for="chave_pix">CHAVE PIX</label>
                <input type="text" id="chave_pix" name="chave_pix" value="{{ cliente.chave_pix or '' }}" placeholder="CPF, E-mail ou Telefone" required>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid #334155; margin: 20px 0;">

        <!-- ENDEREÇO -->
        <div class="row">
            <div class="input-group" style="flex: 0 0 35%;">
                <label for="cep">CEP</label>
                <!-- Dispara busca automática ao sair do campo através do ux-helper.js -->
                <input type="text" id="cep" name="cep" value="{{ cliente.cep or '' }}" placeholder="00000-000" onblur="buscarCEP(this.value)" required>
            </div>
            <div class="input-group">
                <label for="endereco">LOGRADOURO</label>
                <input type="text" id="endereco" name="endereco" value="{{ cliente.endereco or '' }}" placeholder="Rua, Av..." required>
            </div>
        </div>

        <div class="row">
            <div class="input-group" style="flex: 0 0 25%;">
                <label for="numero">Nº</label>
                <input type="text" id="numero" name="numero" value="{{ cliente.numero or '' }}" required>
            </div>
            <div class="input-group">
                <label for="bairro">BAIRRO</label>
                <input type="text" id="bairro" name="bairro" value="{{ cliente.bairro or '' }}" required>
            </div>
        </div>

        <div class="input-group">
            <label for="complemento">COMPLEMENTO</label>
            <input type="text" id="complemento" name="complemento" value="{{ cliente.complemento or '' }}" placeholder="Apto, Bloco, Referência...">
        </div>

        <!-- PONTUAL: DADOS OCULTOS PARA MANTER O CONTEXTO DO AGENDAMENTO -->
        <!-- Busca no form ou na session para garantir que o dado chegue ao server.py -->
        <input type="hidden" name="data_entrega" value="{{ request.form.get('data_entrega') or session.get('data_entrega', '') }}">
        <input type="hidden" name="periodo_entrega" value="{{ request.form.get('periodo_entrega') or session.get('periodo_entrega', '') }}">
        
        <!-- FLAG DE SUBMISSÃO -->
        <input type="hidden" name="cadastro_completado" value="1">

        <button type="submit" class="btn-glow">SALVAR E FINALIZAR</button>
    </form>
</div>
{% endblock %}
