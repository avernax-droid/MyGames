{% extends "base.html" %}

{% block title %}Finalizar Cadastro{% endblock %}

{% block content %}
<div class="card-padrao">
    <header style="margin-bottom: 20px;">
        <h2 style="font-family: 'Rajdhani', sans-serif; color: var(--cor-destaque); text-align: center; text-transform: uppercase; margin: 0;">
            Level 5: Player Profile
        </h2>
        <p style="text-align: center; color: var(--texto-dim); font-size: 0.9rem; margin-top: 5px;">
            Insira seu CPF para identificar seu perfil e finalizar a proposta do lote.
        </p>
    </header>

    <form action="/finalizar-lote" method="POST">
        
        <div class="row">
            <div class="input-group" style="flex: 0 0 40%;">
                <label for="cpf">CPF *</label>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="text" id="cpf" name="cpf" value="{{ cliente.cpf or '' }}" placeholder="000.000.000-00" maxlength="14" required autocomplete="off" style="background: #121212; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px; width: 100%;">
                </div>
                <span id="feedbackCpf" style="display:none; font-size: 0.75rem; margin-top: 4px;"></span>
            </div>
            <div class="input-group" style="flex: 1;">
                <label for="nome">Nome Completo *</label>
                <input type="text" id="nome" name="nome" value="{{ cliente.nome or '' }}" required style="background: #121212; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px;">
            </div>
        </div>

        <div class="row" style="display: flex; gap: 15px; margin-bottom: 15px;">
            <div class="input-group" style="flex: 1;">
                <label for="whatsapp">WhatsApp *</label>
                <input type="text" id="whatsapp" name="whatsapp" value="{{ cliente.whatsapp or '' }}" placeholder="(00) 00000-0000" maxlength="15" required style="background: #121212; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px;">
            </div>
            <div class="input-group" style="flex: 1;">
                <label for="email">E-mail *</label>
                <input type="email" id="email" name="email" value="{{ cliente.email or '' }}" placeholder="seu@email.com" required style="background: #121212; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px;">
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

        <div class="row" style="display: flex; gap: 15px; margin-bottom: 15px;">
            <div class="input-group" style="flex: 0 0 35%;">
                <label for="cep">CEP *</label>
                <input type="text" id="cep" name="cep" value="{{ cliente.cep or '' }}" placeholder="00000-000" maxlength="9" required style="background: #121212; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px;">
            </div>
            <div class="input-group" style="flex: 1;">
                <label for="endereco">ENDEREÇO (LOGRADOURO) *</label>
                <input type="text" id="endereco" name="endereco" value="{{ cliente.endereco or '' }}" placeholder="Rua, Av..." required style="background: #121212; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px;">
            </div>
        </div>

        <div class="row" style="display: flex; gap: 15px; margin-bottom: 15px;">
            <div class="input-group" style="flex: 0 0 25%;">
                <label for="numero">Nº *</label>
                <input type="text" id="numero" name="numero" value="{{ cliente.numero or '' }}" required style="background: #121212; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px;">
            </div>
            <div class="input-group" style="flex: 1;">
                <label for="bairro">BAIRRO *</label>
                <input type="text" id="bairro" name="bairro" value="{{ cliente.bairro or '' }}" required style="background: #121212; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px;">
            </div>
        </div>

        <div class="input-group" style="margin-bottom: 15px;">
            <label for="complemento">COMPLEMENTO</label>
            <input type="text" id="complemento" name="complemento" value="{{ cliente.complemento or '' }}" placeholder="Apto, Bloco, Referência..." style="background: #121212; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px;">
        </div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

        <div class="input-group">
            <label for="chave_pix">CHAVE PIX *</label>
            <input type="text" id="chave_pix" name="chave_pix" value="{{ cliente.chave_pix or '' }}" placeholder="CPF, E-mail ou Chave Aleatória" required style="background: #121212; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px;">
        </div>

        <input type="hidden" name="cadastro_completado" value="1">
        <input type="hidden" id="cidade" name="cidade" value="{{ cliente.cidade or '' }}">
        <input type="hidden" id="estado_uf" name="estado_uf" value="{{ cliente.estado_uf or '' }}">

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 25px;">
            <button type="button" onclick="history.back()" class="btn-secondary">
                VOLTAR
            </button>
            <button type="submit" class="btn-primary" style="width: max-content;">
                GERAR PROTOCOLO
            </button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    // [Script mantido igual ao original, apenas com o layout CSS removido acima]
    function limparCamposPorAlteracaoCPF() {
        document.getElementById('nome').value = '';
        document.getElementById('email').value = '';
        document.getElementById('numero').value = '';
        document.getElementById('bairro').value = '';
        document.getElementById('complemento').value = '';
        document.getElementById('cidade').value = '';
        document.getElementById('estado_uf').value = '';
        document.getElementById('chave_pix').value = '';
        document.getElementById('endereco').value = '';
        document.getElementById('cep').value = '';
        document.getElementById('whatsapp').value = '';
    }

    function aplicarMascaraCPF(valor) {
        let val = valor.replace(/\D/g, '');
        if (val.length > 9) return val.substring(0, 3) + '.' + val.substring(3, 6) + '.' + val.substring(6, 9) + '-' + val.substring(9, 11);
        else if (val.length > 6) return val.substring(0, 3) + '.' + val.substring(3, 6) + '.' + val.substring(6, 9);
        else if (val.length > 3) return val.substring(0, 3) + '.' + val.substring(3, 6);
        return val;
    }

    function aplicarMascaraCEP(valor) {
        let val = valor.replace(/\D/g, '');
        if (val.length > 5) return val.substring(0, 5) + '-' + val.substring(5, 8);
        return val;
    }

    function aplicarMascaraWhatsApp(valor) {
        let val = valor.replace(/\D/g, '');
        if (val.length > 10) return '(' + val.substring(0, 2) + ') ' + val.substring(2, 7) + '-' + val.substring(7, 11);
        else if (val.length > 6) return '(' + val.substring(0, 2) + ') ' + val.substring(2, 6) + '-' + val.substring(6, 10);
        else if (val.length > 2) return '(' + val.substring(0, 2) + ') ' + val.substring(2);
        return val;
    }

    document.getElementById('cpf').addEventListener('blur', function() {
        const cpfLimpo = this.value.replace(/\D/g, ''); 
        const feedback = document.getElementById('feedbackCpf');
        if (cpfLimpo.length === 11) {
            feedback.style.display = 'block';
            feedback.style.color = '#ff8c00';
            feedback.textContent = 'Buscando perfil...';
            fetch(`/api/obter_cliente_por_cpf?cpf=${cpfLimpo}`)
                .then(r => r.json())
                .then(d => {
                    if (d.sucesso && d.cliente) {
                        const c = d.cliente;
                        document.getElementById('nome').value = c.nome || c.nome_completo || '';
                        document.getElementById('email').value = c.email || '';
                        document.getElementById('numero').value = c.numero || '';
                        document.getElementById('bairro').value = c.bairro || '';
                        document.getElementById('complemento').value = c.complemento || '';
                        document.getElementById('cidade').value = c.cidade || '';
                        document.getElementById('estado_uf').value = c.estado_uf || c.uf || '';
                        document.getElementById('chave_pix').value = c.chave_pix || '';
                        document.getElementById('endereco').value = c.endereco || c.rua || '';
                        if (c.cep) document.getElementById('cep').value = aplicarMascaraCEP(c.cep);
                        if (c.whatsapp) document.getElementById('whatsapp').value = aplicarMascaraWhatsApp(c.whatsapp);
                        feedback.style.color = '#00ffcc';
                        feedback.textContent = '✓ Perfil recuperado!';
                    } else {
                        limparCamposPorAlteracaoCPF();
                        feedback.style.color = '#64748b';
                        feedback.textContent = 'Novo perfil detectado.';
                    }
                });
        }
    });

    document.getElementById('cpf').addEventListener('input', (e) => {
        e.target.value = aplicarMascaraCPF(e.target.value);
        if (e.target.value.replace(/\D/g, '').length < 11) {
            limparCamposPorAlteracaoCPF();
            document.getElementById('feedbackCpf').style.display = 'none';
        }
    });

    document.querySelector('form').addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            if (event.target.id === 'cpf') event.target.blur();
            const inputs = Array.from(this.querySelectorAll('input:not([type="hidden"])'));
            const index = inputs.indexOf(event.target);
            if (index > -1 && index < inputs.length - 1) inputs[index + 1].focus();
        }
    });
</script>
{% endblock %}
