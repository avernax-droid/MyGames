{% extends 'base.html' %}

{% block title %}Identificação - MyGames{% endblock %}

{% block content %}
<section class="card-lead">
    <header class="form-header">
        <h2>Dados do Cliente</h2>
        <p>Preencha os campos abaixo para iniciar sua avaliação.</p>
    </header>

    <form action="/selecionar" method="POST">
        <input type="hidden" name="origem_lead" value="Direto">

        <div class="input-group">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome_completo" placeholder="Como devemos te chamar?" required>
        </div>

        <div class="row">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="Para enviarmos a cotação" required>
            </div>
            <div class="input-group">
                <label for="whatsapp">WhatsApp</label>
                <input type="tel" id="whatsapp" name="whatsapp" placeholder="(11) 99999-9999" required>
            </div>
        </div>

        <div class="row">
            <div class="input-group" style="position: relative;">
                <label for="cidade">Cidade</label>
                <input type="text" id="cidade" name="cidade" placeholder="Busque sua cidade" autocomplete="off" required>
                <div id="sugestoes-cidades" class="dropdown-sugestoes"></div>
            </div>
        </div>

        <div class="row">
            <div class="input-group">
                <label for="estado_nome">Estado</label>
                <input type="text" id="estado_nome" name="estado_nome" placeholder="Estado" readonly required>
            </div>
            <div class="input-group" style="max-width: 80px;">
                <label for="estado_uf">UF</label>
                <input type="text" id="estado_uf" name="estado_uf" placeholder="UF" readonly required>
            </div>
        </div>

        <button type="submit" class="btn-glow">AVANÇAR PARA PRODUTOS</button>
    </form>
</section>
{% endblock %}
