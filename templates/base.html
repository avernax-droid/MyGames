<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyGames - {% block title %}{% endblock %}</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* --- AJUSTE GLOBAL v1.8 --- */
        * {
            box-sizing: border-box; /* Essencial para que os campos de upload e texto não quebrem o layout */
        }

        body {
            background-color: #0d0d0d; /* Fundo padrão para evitar "clarão" antes do CSS carregar */
            color: #fff;
            margin: 0;
            font-family: 'Roboto', sans-serif;
        }

        /* --- ESTRUTURA DE FASES CENTRALIZADA (STEPPER) --- */
        .fases-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            max-width: 800px;
            margin: 30px auto 50px;
            position: relative;
            padding: 0 10px;
        }

        .fases-container::before {
            content: "";
            position: absolute;
            top: 15px; 
            left: 50px;
            right: 50px;
            height: 2px;
            background: #333;
            z-index: 1;
        }

        .fase-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
            position: relative;
        }

        .circulo-externo {
            width: 30px;
            height: 30px;
            background: #121212;
            border: 2px solid #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .circulo-interno {
            width: 14px;
            height: 14px;
            background: transparent; 
            border-radius: 50%;
            transition: 0.3s;
        }

        .fase-name, .fase-nome {
            font-family: 'Rajdhani', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .fase-item.concluida .circulo-externo {
            border-color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }

        .fase-item.concluida .circulo-interno {
            background: #00ff00;
            box-shadow: 0 0 8px #00ff00;
        }

        .fase-item.concluida .fase-nome {
            color: #00ff00;
        }

        .client-logo[src*="404"] { display: none; }

        /* Ajuste para garantir que o container principal centralize o conteúdo gamer */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- ALTERAÇÃO: Reordenação e mapeamento matemático para o fluxo anônimo -->
        <div class="fases-container">
            <!-- Passo 1: Busca de Produto -->
            <div class="fase-item {{ 'concluida' if fase_atual >= 1 }}">
                <div class="circulo-externo"><div class="circulo-interno"></div></div>
                <span class="fase-nome">Produto</span>
            </div>

            <!-- Passo 2 e 3: Escolha do Estado & Visualização do preço individual -->
            <div class="fase-item {{ 'concluida' if fase_atual >= 2 }}">
                <div class="circulo-externo"><div class="circulo-interno"></div></div>
                <span class="fase-nome">Avaliação</span>
            </div>

            <!-- Passo 4: Carrinho/Resumo do Lote de Produtos -->
            <div class="fase-item {{ 'concluida' if fase_atual >= 4 }}">
                <div class="circulo-externo"><div class="circulo-interno"></div></div>
                <span class="fase-nome">Oferta</span>
            </div>

            <!-- Passo 5: CPF / Dados do Cliente -->
            <div class="fase-item {{ 'concluida' if fase_atual >= 5 }}">
                <div class="circulo-externo"><div class="circulo-interno"></div></div>
                <span class="fase-nome">Identificação</span>
            </div>

            <!-- Passo 6: Geração do Protocolo de Recompra -->
            <div class="fase-item {{ 'concluida' if fase_atual >= 6 }}">
                <div class="circulo-externo"><div class="circulo-interno"></div></div>
                <span class="fase-nome">Protocolo</span>
            </div>
        </div>

        <header>
            <div class="logo-container" style="text-align: center; margin-bottom: 40px;">
                <img src="{{ url_for('static', filename='images/logo-cliente.png') }}" alt="Logo Cliente" class="client-logo" onerror="this.style.display='none'" style="max-height: 80px;">
                <h1 style="font-family: 'Rajdhani', sans-serif; font-size: 3rem; margin: 0;">MY<span style="color: #00ff00;">GAMES</span></h1>
            </div>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/ux-helper.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
