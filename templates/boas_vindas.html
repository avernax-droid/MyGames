{% extends 'base.html' %}

{% block title %}Bem-vindo ao MyGames{% endblock %}

{% block content %}
<div class="card-padrao">
    <p style="text-align: center; color: var(--texto-dim); margin-bottom: 30px; font-size: 14px;">
        Informe sua localização para acessar o catálogo
    </p>
    
    <form action="{{ url_for('definir_regiao') }}" method="POST">
        <div class="form-group">
            <input type="text" id="campo-cidade" name="cidade" placeholder="Digite sua cidade..." autocomplete="off" required>
            <div id="lista-cidades"></div>
        </div>
        <div class="form-group">
            <input type="text" id="campo-uf" name="estado_uf" placeholder="Estado (UF)" readonly required>
        </div>

        <div id="secao-canal">
            <h3 style="text-align: center; font-size: 16px; margin: 15px 0; color: var(--texto-br);">Como você nos conheceu?</h3>
            <div class="form-group">
                <select name="canal_aquisicao_id" id="canal_id_input" required onchange="liberarBotao()">
                    <option value="" disabled selected>Selecione uma opção...</option>
                    {% for canal in canais %}
                    <option value="{{ canal.id }}">{{ canal.nome_exibicao }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <button type="submit" id="btn-entrar" class="btn-primary" style="width: 100%;">Entrar no Catálogo</button>
    </form>
</div>

<style>
    /* Estilos específicos para os inputs e lista de cidades, mantendo o tema global */
    .form-group { margin-bottom: 20px; position: relative; }
    input, select { width: 100%; padding: 14px; background: #222; border: var(--borda-fina); color: #fff; border-radius: 6px; font-size: 16px; transition: border 0.3s; }
    input:focus, select:focus { outline: none; border-color: var(--cor-destaque); }
    
    #lista-cidades { 
        position: absolute; top: 100%; left: 0; right: 0; 
        background: #222; border: 1px solid var(--cor-destaque); 
        border-top: none; z-index: 1000; max-height: 250px; 
        overflow-y: auto; display: none; border-radius: 0 0 6px 6px;
    }
    #lista-cidades div { padding: 12px 15px; cursor: pointer; color: #ddd; border-bottom: 1px solid #333; }
    #lista-cidades div:hover { background: var(--cor-destaque); color: #000; }
    
    #secao-canal { display: none; border-top: var(--borda-fina); padding-top: 15px; }
    #btn-entrar { display: none; }
</style>
{% endblock %}

{% block scripts %}
<script>
    const inputCidade = document.getElementById('campo-cidade');
    const listaCidades = document.getElementById('lista-cidades');
    const inputUf = document.getElementById('campo-uf');
    const secaoCanal = document.getElementById('secao-canal');
    const btnEntrar = document.getElementById('btn-entrar');

    inputCidade.addEventListener('input', async () => {
        const termo = inputCidade.value;
        if (termo.length < 3) { listaCidades.style.display = 'none'; return; }

        const response = await fetch(`/api/buscar_cidades?q=${encodeURIComponent(termo)}`);
        const dados = await response.json();

        listaCidades.innerHTML = '';
        if (dados.length > 0) {
            dados.forEach(item => {
                const div = document.createElement('div');
                div.textContent = `${item.cidade} - ${item.uf}`;
                div.onmousedown = () => {
                    inputCidade.value = item.cidade;
                    inputUf.value = item.uf;
                    listaCidades.style.display = 'none';
                    secaoCanal.style.display = 'block';
                };
                listaCidades.appendChild(div);
            });
            listaCidades.style.display = 'block';
        } else {
            listaCidades.style.display = 'none';
        }
    });

    document.addEventListener('click', (e) => {
        if (e.target !== inputCidade) listaCidades.style.display = 'none';
    });

    function liberarBotao() {
        const select = document.getElementById('canal_id_input');
        if (select.value !== "") {
            btnEntrar.style.display = 'block';
        }
    }
</script>
{% endblock %}
